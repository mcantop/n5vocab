<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Vocab Quiz</title>
<style>
:root {
  --bg: #111111;
  --bg2: #1a1a1a;
  --bg3: #222222;
  --bg4: #2a2a2a;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.18);
  --text: #f0f0f0;
  --text2: #888;
  --text3: #444;
  --green: #1D9E75;
  --green-bg: #0d2e22;
  --red: #E24B4A;
  --red-bg: #2e1111;
  --green-text: #4ecfa0;
  --red-text: #f07070;
  --yellow: #e6a817;
  --yellow-bg: #2a2000;
  --accent: #4e8fff;
  --accent-bg: #0d1e3a;
  --accent-border: rgba(78,143,255,0.4);
}
.light {
  --bg: #f2f2f2;
  --bg2: #ffffff;
  --bg3: #e8e8e8;
  --bg4: #dedede;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.18);
  --text: #111;
  --text2: #666;
  --text3: #bbb;
  --green: #1D9E75;
  --green-bg: #e1f5ee;
  --red: #E24B4A;
  --red-bg: #fcebeb;
  --green-text: #0F6E56;
  --red-text: #993C1D;
  --yellow: #b07d00;
  --yellow-bg: #fdf6e3;
  --accent: #2563eb;
  --accent-bg: #eff6ff;
  --accent-border: rgba(37,99,235,0.35);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; min-height: 100vh; }
.wrap {
  max-width: 520px; margin: 0 auto;
  padding: calc(1.25rem + env(safe-area-inset-top)) calc(1rem + env(safe-area-inset-right)) calc(3rem + env(safe-area-inset-bottom)) calc(1rem + env(safe-area-inset-left));
}

/* ── TOPBAR ── */
.topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
.topbar-left { font-size: 13px; font-weight: 500; color: var(--text3); letter-spacing: 0.04em; }
.topbar-right { display: flex; gap: 8px; }
.pill-btn {
  background: var(--bg2);
  border: 0.5px solid var(--border2);
  border-radius: 20px;
  padding: 5px 14px;
  min-height: 44px;
  min-width: 44px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
  touch-action: manipulation;
  -webkit-tap-highlight-color: rgba(255,255,255,0.15);
  user-select: none;
}
.pill-btn:hover { background: var(--bg3); color: var(--text); }
.pill-btn:active { background: var(--bg4); transform: scale(0.96); }



/* ── SESSION BAR ── */
.session-bar {
  display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 0.85rem;
  min-height: 20px;
}
.session-tag {
  font-size: 11px; color: var(--text3);
  letter-spacing: 0.03em;
  padding: 2px 0;
}
.session-tag + .session-tag::before {
  content: "·";
  margin-right: 6px;
  color: var(--text3);
}

/* ── CARD ── */
/* card advance: slide out left, new card slides in from right */
@keyframes cardSlideOutLeft {
  from { opacity: 1; transform: translateX(0)     scale(1); }
  to   { opacity: 0; transform: translateX(-48px) scale(0.96); }
}
@keyframes cardSlideInRight {
  from { opacity: 0; transform: translateX(48px)  scale(0.96); }
  to   { opacity: 1; transform: translateX(0)     scale(1); }
}
/* card flip reveal: rotateY flip on inner content */
@keyframes flipOut {
  from { transform: rotateY(0deg);    opacity: 1; }
  to   { transform: rotateY(90deg);   opacity: 0; }
}
@keyframes flipIn {
  from { transform: rotateY(-90deg);  opacity: 0; }
  to   { transform: rotateY(0deg);    opacity: 1; }
}
@keyframes revealIn {
  from { opacity: 0; transform: translateY(5px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes cardSlideOutRight {
  from { opacity: 1; transform: translateX(0)    scale(1); }
  to   { opacity: 0; transform: translateX(48px) scale(0.96); }
}
@keyframes cardSlideInLeft {
  from { opacity: 0; transform: translateX(-48px) scale(0.96); }
  to   { opacity: 1; transform: translateX(0)     scale(1); }
}
@keyframes barGrow {
  from { transform: scaleX(0); }
  to   { transform: scaleX(1); }
}
.progress-wrap { height: 2px; background: var(--bg3); border-radius: 1px; margin-bottom: 1rem; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 1px; transition: width 0.3s ease; width: 0%; }
.card {
  background: var(--bg2);
  border: 0.5px solid var(--border2);
  border-radius: 16px;
  padding: 2.25rem 1.5rem 1.75rem;
  text-align: center;
  min-height: 210px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  margin-bottom: 1rem;
  overflow: hidden;
  animation: cardSlideInRight 0.25s ease both;
}
.card:hover { border-color: var(--border2); }
.card.correct { background: var(--green-bg); border-color: var(--green); }
.card.wrong   { background: var(--red-bg);   border-color: var(--red);   }

/* struggle indicator — left edge bar */
.card-struggle-bar {
  position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  border-radius: 16px 0 0 16px;
  transition: background 0.4s;
  transform-origin: top;
}
.card-struggle-bar.animate { animation: barGrow 0.35s ease both; }

.card-body { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 0; }
.card-body.flip-out { animation: flipOut 0.18s ease both; }
.card-body.flip-in  { animation: flipIn  0.18s ease both; }
.card-top { position: absolute; top: 14px; left: 0; right: 64px; display: flex; justify-content: flex-start; gap: 10px; padding: 0 16px; }
.card-counter { font-size: 11px; color: var(--text3); }
.card-set-badge { font-size: 11px; color: var(--text3); }

/* unified type scale — everything inherits the same rhythm */
.prompt-lang { font-size: 10px; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 1rem; }
.prompt-text { font-size: 22px; font-weight: 500; color: var(--text); line-height: 2.1; max-width: 100%; }
.prompt-sub  { font-size: 14px; color: var(--text2); margin-top: 0.3rem; }

/* reveal: same size as prompt, weight drops to differentiate */
.answer-reveal { font-size: 22px; font-weight: 400; margin-top: 1.1rem; line-height: 2.1; color: var(--text); animation: revealIn 0.18s ease both; width: 100%; }
.answer-reveal.ok  { color: var(--green-text); }
.answer-reveal.bad { color: var(--red-text); }

/* Q&A: question + answer stacked, Q/A labels on the left */
.qa-row { display: flex; gap: 10px; text-align: left; align-items: baseline; margin: 0.55rem 0; }
.qa-label { font-size: 10px; color: var(--text3); font-weight: 700; letter-spacing: 0.08em; flex: 0 0 auto; width: 12px; }
.qa-text { font-size: 17px; font-weight: 500; flex: 1; line-height: 1.9; }
.qa-text rt { font-size: 0.55em; color: var(--text2); }

/* furigana: sized relative to parent so it scales with prompt/answer font */
ruby { ruby-align: center; }
rt { font-size: 0.5em; color: var(--text2); font-weight: 400; }

/* divider between prompt and answer */
.card-divider { width: 32px; height: 1px; background: var(--border2); margin: 0.9rem auto 0; }

/* user attempt: same line height, clearly secondary */
.user-attempt { font-size: 16px; font-weight: 400; color: var(--text3); margin-top: 0.5rem; width: 100%; word-break: break-word; line-height: 1.5; font-style: italic; }

/* vocab hint: smallest, tucked below */


.card-hint-bottom {
  font-size: 20px; font-weight: 500; color: var(--text2);
  text-align: center; margin-top: 1.1rem;
  animation: revealIn 0.18s ease both;
  line-height: 2.2; width: 100%;
}
.card-hint-bottom rt { font-size: 0.6em; }



/* ── ACTION ZONE ── */
.action-zone { height: 42px; margin-bottom: 0.9rem; position: relative; }
.action-row {
  display: flex; gap: 8px;
  position: absolute; top: 0; left: 0; right: 0;
  opacity: 0; pointer-events: none;
  transition: opacity 0.16s ease;
}
.action-row.visible { opacity: 1; pointer-events: all; animation: revealIn 0.16s ease both; }
.action-row input {
  flex: 1; background: var(--bg2); border: 0.5px solid var(--border2);
  border-radius: 10px; padding: 0.7rem 0.85rem; min-height: 50px;
  color: var(--text); font-size: 16px; outline: none;
}
.action-row input:focus { border-color: var(--accent); }

/* ── BUTTONS ── */
.btn {
  flex: 1; padding: 0.7rem 0.75rem; min-height: 50px;
  display: inline-flex; align-items: center; justify-content: center;
  border: 0.5px solid var(--border2); border-radius: 10px;
  background: transparent; color: var(--text2);
  font-size: 16px; cursor: pointer; transition: all 0.15s;
  touch-action: manipulation; -webkit-tap-highlight-color: rgba(0,0,0,0);
  user-select: none; -webkit-user-select: none;
}
.btn:hover { background: var(--bg3); color: var(--text); }
.btn:active { transform: scale(0.97); }
.btn.danger  { border-color: rgba(226,75,74,0.4);  color: var(--red-text); }
.btn.success { border-color: rgba(29,158,117,0.4); color: var(--green-text); }
.btn-check { flex: 0 0 auto; width: 76px; }



/* ── PANELS (Config / Stats) ── */
.panel-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(6px);
  z-index: 50;
  align-items: flex-end;
  justify-content: center;
}
.panel-overlay.open { display: flex; }
.panel {
  background: var(--bg2);
  border: 0.5px solid var(--border2);
  border-radius: 20px 20px 0 0;
  padding: 1.25rem 1.25rem calc(2rem + env(safe-area-inset-bottom));
  width: min(520px, 100vw);
  max-height: 85vh;
  overflow-y: auto;
  display: flex; flex-direction: column; gap: 1.25rem;
}
.panel-handle { width: 36px; height: 3px; background: var(--border2); border-radius: 2px; margin: 0 auto 0.5rem; }
.panel-title { font-size: 13px; font-weight: 600; color: var(--text); letter-spacing: 0.02em; }
.panel-section { display: flex; flex-direction: column; gap: 8px; }
.panel-label { font-size: 11px; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; }
.panel-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.panel-chip {
  font-size: 14px; padding: 9px 15px; min-height: 44px;
  display: inline-flex; align-items: center; justify-content: center;
  border: 0.5px solid var(--border2); border-radius: 22px;
  background: transparent; color: var(--text2);
  cursor: pointer; transition: all 0.15s; user-select: none; -webkit-user-select: none;
  touch-action: manipulation; -webkit-tap-highlight-color: rgba(0,0,0,0);
}
.panel-chip:active { transform: scale(0.96); }
.panel-chip:hover { background: var(--bg3); color: var(--text); }
.panel-chip.active { background: var(--accent-bg); border-color: var(--accent-border); color: var(--accent); font-weight: 500; }
@keyframes chipShake {
  0%,100% { transform: translateX(0); }
  20%      { transform: translateX(-5px); }
  40%      { transform: translateX(5px); }
  60%      { transform: translateX(-4px); }
  80%      { transform: translateX(4px); }
}
.panel-chip.shake { animation: chipShake 0.35s ease; }
.chip-count { font-size: 10px; opacity: 0.6; margin-left: 3px; }
.panel-divider { height: 0.5px; background: var(--border); }

.panel-row { display: flex; gap: 8px; }
.panel-btn {
  flex: 1; padding: 0.6rem 0.75rem; min-height: 44px;
  display: inline-flex; align-items: center; justify-content: center;
  border: 0.5px solid var(--border2); border-radius: 8px;
  background: transparent; color: var(--text2);
  font-size: 14px; cursor: pointer; transition: all 0.15s; text-align: center;
  touch-action: manipulation; -webkit-tap-highlight-color: rgba(0,0,0,0);
  user-select: none; -webkit-user-select: none;
}
.panel-btn:hover { background: var(--bg3); color: var(--text); }
.panel-btn.active { background: var(--bg3); border-color: var(--border2); color: var(--text); font-weight: 500; }
.panel-btn.danger { border-color: rgba(226,75,74,0.3); color: var(--red-text); }
.panel-btn.danger:hover { background: var(--red-bg); border-color: rgba(226,75,74,0.6); }

/* ── STATS PANEL ── */
.stats-grid { display: flex; gap: 8px; }
.stat-box { flex: 1; background: var(--bg3); border-radius: 10px; padding: 0.7rem 0.5rem; text-align: center; }
.stat-num { font-size: 24px; font-weight: 500; }
.stat-lbl { font-size: 10px; color: var(--text2); margin-top: 2px; letter-spacing: 0.04em; text-transform: uppercase; }

.card-list { display: flex; flex-direction: column; gap: 4px; max-height: 320px; overflow-y: auto; }
.card-item {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 10px; border-radius: 8px;
  background: var(--bg3); font-size: 13px;
}
.card-item-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.card-item-dot.mastered  { background: var(--green); }
.card-item-dot.learning  { background: var(--yellow); }
.card-item-dot.struggling{ background: var(--red); }
.card-item-jp  { color: var(--text); font-weight: 500; flex: 0 0 auto; max-width: 45%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.card-item-en  { color: var(--text2); font-size: 12px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.card-item-score { font-size: 11px; color: var(--text3); flex-shrink: 0; }

/* hint button */


/* rep counter */
.rep-zone { display: flex; flex-direction: column; align-items: center; gap: 6px; margin-bottom: 1rem; animation: revealIn 0.2s ease both; }
.rep-arc-wrap { position: relative; width: 80px; height: 80px; cursor: pointer; user-select: none; }
.rep-arc-wrap:active { transform: scale(0.93); }
.rep-arc { width: 80px; height: 80px; transform: rotate(-90deg); }
.rep-arc-bg   { fill: none; stroke: var(--bg3); stroke-width: 5; }
.rep-arc-fill { fill: none; stroke: var(--green); stroke-width: 5; stroke-linecap: round;
                stroke-dasharray: 201; stroke-dashoffset: 201;
                transition: stroke-dashoffset 0.25s ease, stroke 0.25s ease; }
.rep-arc-fill.done { stroke: var(--green); }
.rep-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.rep-num  { font-size: 22px; font-weight: 600; color: var(--text); line-height: 1; }
.rep-goal { font-size: 11px; color: var(--text3); margin-top: 1px; }
.rep-label { font-size: 11px; color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; }
/* answer toggle (hide answer during spoken reps for active recall) */
.rep-toggle {
  background: var(--bg3); border: 0.5px solid var(--border2); color: var(--text2);
  border-radius: 20px; padding: 4px 14px; font-size: 12px; cursor: pointer;
  transition: all 0.15s; user-select: none; margin-top: 1.1rem; align-self: center;
}
.rep-toggle:hover { background: var(--bg4); color: var(--text); }
/* hidden answer = blurred in place: keeps the prompt readable, no layout shift,
   no empty gap. Tap "Show answer" / press H to bring it into focus. */
#arev, #card-hint, #user-attempt { transition: filter 0.2s ease; }
.card-body.answer-hidden #arev,
.card-body.answer-hidden #card-hint,
.card-body.answer-hidden #user-attempt {
  filter: blur(8px);
  user-select: none;
}
@keyframes repPop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.18); }
  100% { transform: scale(1); }
}
.rep-arc-wrap.pop { animation: repPop 0.22s ease; }

/* session summary */
.summary-screen {
  text-align: center; padding: 1.5rem 0;
  display: none; flex-direction: column; align-items: center; gap: 1rem;
}
.summary-screen.visible { display: flex; }
.summary-title { font-size: 22px; font-weight: 600; }
.summary-grid { display: flex; gap: 10px; width: 100%; }
.summary-stat { flex: 1; background: var(--bg3); border-radius: 10px; padding: 0.85rem 0.5rem; text-align: center; }
.summary-stat-num { font-size: 26px; font-weight: 500; }
.summary-stat-lbl { font-size: 10px; color: var(--text2); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.04em; }

/* ── AUDIO ── */
.prompt-lang-row { display: flex; align-items: center; justify-content: center; gap: 6px; margin-bottom: 1rem; }
.prompt-lang-row .prompt-lang { margin-bottom: 0; }

/* ── QA INLINE AUDIO ── */
.qa-audio-btn {
  display: inline-flex; align-items: center; justify-content: center;
  width: 36px; height: 36px; margin: 0 8px 0 2px; flex: 0 0 auto;
  background: var(--bg3); border: 0.5px solid var(--border2); color: var(--text2);
  border-radius: 50%; cursor: pointer; font-size: 16px; line-height: 1;
  transition: all 0.15s; vertical-align: middle;
  touch-action: manipulation; -webkit-tap-highlight-color: rgba(0,0,0,0);
  user-select: none; -webkit-user-select: none;
}
.qa-audio-btn:hover { background: var(--bg4); color: var(--text); }
.qa-audio-btn:active { transform: scale(0.9); }
.qa-audio-btn.playing { color: var(--accent); border-color: var(--accent-border); background: var(--accent-bg); }

/* primary speaker button on the card — large, obvious tap target */
#card-audio {
  position: absolute; top: 10px; right: 10px; z-index: 3;
  width: 44px; height: 44px; font-size: 20px; margin: 0;
  background: var(--accent-bg); border: 1px solid var(--accent-border); color: var(--accent);
  box-shadow: 0 2px 8px rgba(0,0,0,0.25);
}
#card-audio:active { transform: scale(0.92); }
#card-audio.playing { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ── ALIGNER ── */

/* ── MASCOT ── */
#mascot {
  position: fixed; right: 18px; bottom: 18px;
  width: 140px; height: auto; z-index: 5;
  pointer-events: none; user-select: none; opacity: 0.96;
}
#mascot svg, #mascot img { width: 100%; height: auto; display: block; overflow: visible; }
.m-fig  { transform-box: fill-box; transform-origin: 50% 100%; animation: mIdle 2.8s ease-in-out infinite; }
.m-tail { transform-box: fill-box; transform-origin: top center; animation: mTail 2.8s ease-in-out infinite; }
.m-tail-r { animation-delay: -1.4s; }
.m-arm  { transform-box: fill-box; transform-origin: top center; }
@keyframes mIdle { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
@keyframes mTail { 0%,100% { transform: rotate(-5deg); } 50% { transform: rotate(5deg); } }
/* celebrate burst on a correct answer */
#mascot.celebrate .m-fig,
#mascot.celebrate img { animation: mDance 0.5s ease-in-out 3; }
#mascot.celebrate .m-arm-l { animation: mArmL 0.5s ease-in-out 3; }
#mascot.celebrate .m-arm-r { animation: mArmR 0.5s ease-in-out 3; }
@keyframes mDance {
  0%   { transform: translateY(0)    rotate(0deg); }
  25%  { transform: translateY(-11px) rotate(-9deg); }
  50%  { transform: translateY(0)    rotate(0deg); }
  75%  { transform: translateY(-11px) rotate(9deg); }
  100% { transform: translateY(0)    rotate(0deg); }
}
@keyframes mArmL { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(42deg); } }
@keyframes mArmR { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(-42deg); } }
@media (max-width: 720px) { #mascot { width: 78px; right: 6px; bottom: 8px; opacity: 0.85; } }
@media (max-width: 430px) { #mascot { display: none; } }
@media (prefers-reduced-motion: reduce) {
  .m-fig, .m-tail, #mascot.celebrate .m-fig, #mascot.celebrate .m-arm-l,
  #mascot.celebrate .m-arm-r, #mascot.celebrate img { animation: none; }
}
</style>
</head>
<body>
<div class="wrap" id="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">練習</div>
    <div class="topbar-right">
      <button type="button" class="pill-btn" id="btn-open-config">⚙ Config</button>
      <button type="button" class="pill-btn" id="btn-open-stats">📊 Stats</button>
    </div>
  </div>
  <script>
    // Direct, defensive binding for the top bar buttons — wired independently
    // of the main script so a problem elsewhere on the page can't block these.
    (function wireTopbarButtons() {
      function bind(id, panelName) {
        const el = document.getElementById(id);
        if (!el) { return; }
        el.addEventListener('click', function (e) {
          e.preventDefault();
          try {
            openPanel(panelName);
          } catch (err) {
            console.error('openPanel failed:', err);
            alert('Could not open ' + panelName + ' panel:\n' + (err && err.message ? err.message : err));
          }
        });
      }
      bind('btn-open-config', 'config');
      bind('btn-open-stats', 'stats');
    })();
  </script>

  <!-- PROGRESS -->
  <div class="progress-wrap"><div class="progress-fill" id="progress-bar"></div></div>

  <!-- SESSION INFO BAR -->
  <div class="session-bar" id="session-bar"></div>

  <!-- CARD -->
  <div class="card" id="card" onclick="flipCard()">
    <div class="card-struggle-bar" id="struggle-bar"></div>
    <div class="card-top">
      <span class="card-counter" id="counter"></span>
      <span class="card-set-badge" id="set-badge"></span>
    </div>
    <div class="card-body" id="card-body">
      <div class="prompt-lang-row">

      <div class="prompt-sub"  id="psub"></div>
      <div class="card-divider" id="card-divider" style="display:none"></div>
      <div class="answer-reveal" id="arev" style="display:none"></div>
      <div class="user-attempt" id="user-attempt" style="display:none"></div>
      <div class="card-hint-bottom" id="card-hint" style="display:none"></div>

      <button class="btn btn-check" onclick="checkAnswer()">Check</button>
    </div>
    <div class="action-row" id="brow-grade">
      <button class="btn danger"  onclick="markResult(false)">✕ Missed</button>
      <button class="btn success" onclick="markResult(true)">✓ Got it</button>
    </div>
    <div class="action-row" id="brow-hint">
      <button class="btn" onclick="revealVocabHint()" style="color:var(--text3)">Show hint</button>
    </div>
    <div class="action-row" id="brow-next"></div>

        <span class="rep-num" id="rep-num">0</span>
        <span class="rep-goal" id="rep-goal">/10</span>
      </div>
    </div>
    <div class="rep-label">say it aloud</div>

    <div class="summary-title" id="sum-title">Round complete</div>
    <div class="summary-grid">
      <div class="summary-stat"><div class="summary-stat-num" id="sum-reviewed">0</div><div class="summary-stat-lbl">reviewed</div></div>
      <div class="summary-stat"><div class="summary-stat-num" id="sum-correct">0</div><div class="summary-stat-lbl">correct</div></div>

    </div>

  </div>

</div>

// FURIGANA NORMALIZATION
// ─────────────────────────────────────────────────────────────
// The furigana/qf/af strings above are hand-authored, and it's easy to wrap a
// whole word in <ruby> when only its kanji core needs annotating — e.g.
// <ruby>ニット帽<rt>ニットぼう</rt></ruby> renders ニット on top of ニット, which
// is just noise. Re-run every pre-baked tag through rubyFromReading so kana that
// already match on either end get trimmed back out. Readings that share no kana
// with their base (6時→ろくじ, ヶ月→かげつ) are left whole, since there the
// annotation is carrying the numeral/counter reading and is worth showing.
function normalizeRubyHTML(html) {
  return html.replace(/<ruby>(.*?)<rt>(.*?)<\/rt><\/ruby>/g,
                      (_tag, base, reading) => rubyFromReading(base, reading));
}
VOCAB_SETS.forEach(set => (set.words || []).forEach(w => {
  ['furigana', 'qf', 'af'].forEach(f => { if (w[f]) w[f] = normalizeRubyHTML(w[f]); });
}));

function openPanel(name) {
  if (name === 'config') {
    renderConfigPanel();
    document.getElementById('panel-config').classList.add('open');
  } else {
    renderStatsPanel();
    document.getElementById('panel-stats').classList.add('open');
  }
}
function closePanel(id) { document.getElementById(id).classList.remove('open'); }
function closePanelOutside(e, id) { if (e.target === document.getElementById(id)) closePanel(id); }

function renderConfigPanel() {
  // set chips
  const vc = document.getElementById('cfg-chips-vocab');
  const sc = document.getElementById('cfg-chips-sent');
  const qc = document.getElementById('cfg-chips-qa');
  vc.innerHTML = ''; sc.innerHTML = ''; qc.innerHTML = '';
  const sorted = [...VOCAB_SETS].sort((a, b) => a.label.localeCompare(b.label, undefined, {numeric: true}));
  sorted.forEach(s => {
    const chip = document.createElement('button');
    chip.className = 'panel-chip' + (activeSetIds.has(s.id) ? ' active' : '');
    chip.innerHTML = s.label + '<span class="chip-count">' + s.words.length + '</span>';
    chip.onclick = function() { toggleSet(s.id, this); renderConfigPanel(); };
    (s.qaSet ? qc : s.sentenceSet ? sc : vc).appendChild(chip);
  });
  // theme buttons
  document.getElementById('cfg-dark').classList.toggle('active', isDark);
  document.getElementById('cfg-light').classList.toggle('active', !isDark);
  document.getElementById('cfg-furi-on').classList.toggle('active', showFurigana);
  document.getElementById('cfg-furi-off').classList.toggle('active', !showFurigana);
  renderRepButtons();
  // reset by set buttons
  const rb = document.getElementById('cfg-reset-btns');
  rb.innerHTML = '';
  VOCAB_SETS.filter(s => !s.sentenceSet && !s.qaSet).forEach(s => {
    const mc = s.words.filter((_, i) => mastered.has(s.id + ':' + i)).length;
    const btn = document.createElement('button');
    btn.className = 'panel-btn';
    btn.style.textAlign = 'left';
    btn.textContent = s.label + ' Words — ' + mc + ' / ' + s.words.length + ' mastered';
    btn.onclick = () => resetSet(s.id);
    rb.appendChild(btn);
  });
  if (!VOCAB_SETS.some(s => !s.sentenceSet && !s.qaSet)) {
    const none = document.createElement('div');
    none.style.cssText = 'font-size:12px;color:var(--text3)';
    none.textContent = 'No vocab sets active';
    rb.appendChild(none);
  }
}

function renderStatsPanel() {
  updateStats();
  const mc = masteredCount();

  const list = document.getElementById('stats-card-list');
  list.innerHTML = '';
  V.forEach(v => {
    const row = document.createElement('div');
    row.className = 'card-item';
    if (v._isQA) {
      row.innerHTML = `<span class="card-item-dot" style="background:var(--text3)"></span>
        <span class="card-item-jp">${v.q.slice(0, 14)}${v.q.length > 14 ? '…' : ''}</span>
        <span class="card-item-en">${v.qen.slice(0, 48)}${v.qen.length > 48 ? '…' : ''}</span>`;
    } else if (v._isSentence) {
      row.innerHTML = `<span class="card-item-dot" style="background:var(--text3)"></span>
        <span class="card-item-jp">${v.vocab}</span>
        <span class="card-item-en">${v.en.slice(0, 52)}${v.en.length > 52 ? '…' : ''}</span>`;
    } else {
      const sc = scores[v._key] || 0;
      const isMastered = mastered.has(v._key);
      const statusClass = isMastered ? 'mastered' : sc >= 2 ? 'learning' : sc === 0 && seenCards.has(v._key) ? 'struggling' : 'learning';
      row.innerHTML = `<span class="card-item-dot ${statusClass}"></span>
        <span class="card-item-jp">${v.jp}</span>
        <span class="card-item-en">${v.en}</span>
        <span class="card-item-score">${isMastered ? '✓' : sc + '/5'}</span>`;
    }
    list.appendChild(row);
  });
}

// ─────────────────────────────────────────────────────────────
// SET SELECTION
// ─────────────────────────────────────────────────────────────
function toggleSet(id, chipEl) {
  if (activeSetIds.has(id)) {
    if (activeSetIds.size === 1) {
      // shake the chip to indicate it can't be deselected
      if (chipEl) {
        chipEl.classList.remove('shake');
        void chipEl.offsetWidth;
        chipEl.classList.add('shake');
        chipEl.addEventListener('animationend', () => chipEl.classList.remove('shake'), { once: true });
      }
      return;
    }
    activeSetIds.delete(id);
  } else {
    activeSetIds.add(id);
  }
  applySetSelection();
}

function applySetSelection() {
  rebuildV(); buildDeck(); showCard(); updateStats(); saveProgress();
}

// ─────────────────────────────────────────────────────────────
// V — flat word list from active sets
// ─────────────────────────────────────────────────────────────
function rebuildV() {
  V = [];
  sessionSentenceDone.clear();
  VOCAB_SETS.forEach(s => {
    if (!activeSetIds.has(s.id)) return;
    const isSentence = s.sentenceSet === true;
    const isQA = s.qaSet === true;
    s.words.forEach((w, i) => {
      const key = s.id + ':' + i;
      if (!(key in scores)) scores[key] = 0;
      V.push({ en: w.en, jp: w.jp, kana: w.kana || '', vocab: w.vocab || '',
               furigana: w.furigana || '',
               q: w.q || '', qf: w.qf || '', qen: w.qen || '',
               a: w.a || '', af: w.af || '', aen: w.aen || '',
               _isSentence: isSentence, _isQA: isQA,
               _setId: s.id, _setLabel: s.label, _key: key });
    });
  });
}

// ─────────────────────────────────────────────────────────────
// DECK — weighted spaced repetition (score 0-5, struggling = more repeats)
// ─────────────────────────────────────────────────────────────
function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildDeck() {
  // all cards (vocab, sentences, Q&A): every card once per cycle, shuffled
  const sentenceIndices = [];
  const vocabIndices = [];
  V.forEach((v, i) => {
    if (v._isSentence || v._isQA) {
      sentenceIndices.push(i);
    } else {
      if (!mastered.has(v._key)) vocabIndices.push(i);
    }
  });

  // every card (vocab, sentence, Q&A) appears exactly once per cycle,
  // then the whole deck is shuffled — no spaced-repetition weighting
  deck = [...sentenceIndices, ...vocabIndices];
  shuffle(deck);

  // assign a random direction per card for mixed mode
  deckDirs = deck.map(() => Math.random() < 0.5 ? 'en-jp' : 'jp-en');

  cur = 0;
}

// repeat-until-correct: when a card is missed, drop it back into the deck a
// few positions later so it doesn't reappear immediately — or at the very end
// if we're near the last card. The round can't finish until it's cleared, and
// the card count grows by one each time. deckDirs is spliced in parallel so the
// prompt direction stays in sync with deck.
function requeueCard(idx) {
  if (!deck.length) return;
  const pos = cur % deck.length;
  const ahead = 2 + Math.floor(Math.random() * 3); // 2–4 cards later
  let insertAt = pos + 1 + ahead;
  if (insertAt > deck.length) insertAt = deck.length; // near the end → append
  const d = deckDirs[pos] || (Math.random() < 0.5 ? 'en-jp' : 'jp-en');
  deck.splice(insertAt, 0, idx);
  deckDirs.splice(insertAt, 0, d);
}

// ─────────────────────────────────────────────────────────────
// UI HELPERS
// ─────────────────────────────────────────────────────────────
function showRow(activeId) {
  ['input-row', 'brow-grade', 'brow-hint', 'brow-next'].forEach(id => {
    document.getElementById(id).classList.toggle('visible', id === activeId);
  });
}

function updateStruggleBar(v) {
  const bar = document.getElementById('struggle-bar');
  if (!v || v._isSentence || v._isQA || !seenCards.has(v._key)) {
    bar.style.background = 'transparent'; bar.classList.remove('animate'); return;
  }
  const sc = scores[v._key] || 0;
  const col = mastered.has(v._key) ? 'var(--green)' : sc === 0 ? 'var(--red)' : sc <= 2 ? 'var(--yellow)' : 'var(--green)';
  bar.style.background = col;
  bar.classList.remove('animate');
  void bar.offsetWidth;
  bar.classList.add('animate');
}

// ─────────────────────────────────────────────────────────────
// CARD DISPLAY
// ─────────────────────────────────────────────────────────────
function dir() {
  if (mode !== 'mixed') return mode;
  return deckDirs[cur % Math.max(deckDirs.length, 1)] || 'en-jp';
}

// ── Q&A rendering ────────────────────────────────────────────
// A Q&A card is a translation pair: one side English, the other Japanese.
// Both the question (Q) and the model answer (A) are shown together so the
// learner produces the whole exchange. Nothing from the target side is shown
// until the card is flipped.
function qaAudioBtn(key, part) {
  if (!keyOffset[key + ':' + part]) return '';
  return '<button class="qa-audio-btn" data-qa="' + key + ':' + part + '" aria-label="Play ' + part.toUpperCase() + '" title="Play ' + part.toUpperCase() + ' (' + (part === 'q' ? 'Q' : 'A') + ' key)"' +
         ' onclick="event.stopPropagation(); playQAPart(\'' + key + '\',\'' + part + '\',this)">🔊</button>';
}
function qaPairHTML(v, jpSide) {
  const q = jpSide ? (showFurigana && v.qf ? v.qf : v.q) : v.qen;
  const a = jpSide ? (showFurigana && v.af ? v.af : v.a) : v.aen;
  return '<div class="qa-row"><span class="qa-label">Q</span>' + qaAudioBtn(v._key, 'q') + '<span class="qa-text">' + q + '</span></div>' +
         '<div class="qa-row"><span class="qa-label">A</span>' + qaAudioBtn(v._key, 'a') + '<span class="qa-text">' + a + '</span></div>';
}
// the side shown on the front (the prompt to translate FROM)
function qaPromptHTML(v, d) { return qaPairHTML(v, d === 'jp-en'); }
// the side revealed on flip (the answer to check)
function qaRevealHTML(v, d) { return qaPairHTML(v, d === 'en-jp'); }

function showCard() {
  // hide summary
  document.getElementById('summary').classList.remove('visible');
  document.getElementById('card').style.display = '';

  if (!V.length) {
    document.getElementById('ptext').textContent = 'Select sets in Config ⚙';
    document.getElementById('ptext').style.fontSize = '18px';
    document.getElementById('plang').textContent = '';
    document.getElementById('psub').textContent = '';
    document.getElementById('arev').style.display = 'none';
    const ch = document.getElementById('card-hint');
  ch.style.display = 'none'; ch.textContent = '';
    document.getElementById('brow-hint').classList.remove('visible');
    document.getElementById('counter').textContent = '';
    document.getElementById('set-badge').textContent = '';
    showRow(null);
    updateStruggleBar(null);
    return;
  }
  if (!deck.length) buildDeck();
  if (!deck.length) {
    showSummary();
    return;
  }

  const idx = deck[cur % deck.length];
  const v = V[idx];
  const d = dir();
  flipped = false;

  document.getElementById('arev').style.display = 'none';
  document.getElementById('card-divider').style.display = 'none';
  document.getElementById('card-hint').style.display = 'none';
  document.getElementById('card-hint').style.fontSize = '';
  document.getElementById('user-attempt').style.display = 'none';
  document.getElementById('brow-hint').classList.remove('visible');
  document.getElementById('user-attempt').textContent = '';
  hideRepZone();
  resetAnswerToggle();
  const cardEl = document.getElementById('card');
  cardEl.className = 'card';
  showRow(null);
  updateStruggleBar(v);

  // audio availability for this card
  audioCurrentKey = v._key;
  const cardAudioBtn = document.getElementById('card-audio');
  if (cardAudioBtn) cardAudioBtn.style.display = keyOffset[v._key] ? 'inline-flex' : 'none';

  if (typing) {
    document.getElementById('ainput').value = '';
    document.getElementById('ainput').placeholder = (v._isSentence || v._isQA) ? '…' : '';
    showRow('input-row');
    setTimeout(() => document.getElementById('ainput').focus(), 50);
  }

  // show hint for all sentence cards regardless of mode
  if (v._isSentence) {
    showRow('brow-hint');
  }

  const ptEl = document.getElementById('ptext');

  if (v._isQA) {
    // Q&A card: show ONLY the prompt side (Q + A). Target side stays hidden until flip.
    document.getElementById('plang').textContent = d === 'en-jp' ? 'English → Japanese' : 'Japanese → English';
    ptEl.style.fontSize = '';
    ptEl.innerHTML = qaPromptHTML(v, d);
    document.getElementById('psub').textContent = '';
  } else {
    document.getElementById('plang').textContent = d === 'en-jp' ? 'English → Japanese' : 'Japanese → English';

    const promptText = d === 'en-jp' ? v.en : v.jp;
    if (d === 'jp-en' && showFurigana) {
      if (v.furigana) {
        ptEl.innerHTML = v.furigana;
      } else if (v.kana && v.kana !== v.jp) {
        ptEl.innerHTML = rubyFromReading(v.jp, v.kana);
      } else {
        ptEl.textContent = promptText;
      }
    } else {
      ptEl.textContent = promptText;
    }
    ptEl.style.fontSize = promptText.length > 40 ? '15px' : promptText.length > 25 ? '18px' : '22px';

    // hide sub-kana when furigana is shown inline; show it otherwise
    const showKanaSub = d === 'jp-en' && v.kana && (!showFurigana || v._isSentence);
    document.getElementById('psub').textContent = showKanaSub ? '（' + v.kana + '）' : '';
  }

  const badge = document.getElementById('set-badge');
  badge.textContent = activeSetIds.size > 1 ? v._setLabel : '';

  const pos = deck.length > 0 ? cur % deck.length : 0;
  document.getElementById('counter').textContent = (pos + 1) + ' / ' + deck.length;
  const pct = deck.length > 0 ? ((pos + 1) / deck.length * 100) : 0;
  document.getElementById('progress-bar').style.width = pct + '%';
  updateStats();

  // autoplay when the Japanese is already on the front (JP→EN)
  if (autoplay && keyOffset[v._key] && dir() === 'jp-en') playCurrentAudio();
}

// Build furigana that annotates ONLY the kanji core of a word, leaving leading
// and trailing kana (okurigana) as plain text. e.g. 柔らかい + やわらかい →
// 柔[やわ]らかい, not [やわらかい] stretched over the whole word.
function isKanaChar(ch) {
  const c = ch.codePointAt(0);
  return (c >= 0x3040 && c <= 0x30FF) || c === 0x30FC; // hiragana, katakana, ー
}
function rubyFromReading(jp, kana) {
  if (!kana || kana === jp) return jp;
  let js = 0, je = jp.length, ks = 0, ke = kana.length;
  while (js < je && ks < ke && jp[js] === kana[ks] && isKanaChar(jp[js])) { js++; ks++; }
  while (je > js && ke > ks && jp[je - 1] === kana[ke - 1] && isKanaChar(jp[je - 1])) { je--; ke--; }
  const core = jp.slice(js, je);
  const reading = kana.slice(ks, ke);
  if (!core || !reading) return jp; // all kana, or nothing left to annotate
  return jp.slice(0, js) + '<ruby>' + core + '<rt>' + reading + '</rt></ruby>' + jp.slice(je);
}

// Look up kana for a vocab keyword and return ruby HTML
function getVocabHintHTML(vocab) {
  if (!vocab) return '';
  for (const set of VOCAB_SETS) {
    if (!set.sentenceSet) {
      const word = set.words.find(w => w.jp === vocab);
      if (word && word.kana && word.kana !== vocab) {
        return rubyFromReading(vocab, word.kana);
      }
      if (word) return vocab; // pure hiragana — no annotation needed
    }
  }
  return vocab;
}

function revealVocabHint() {
  const idx = deck[cur % deck.length];
  const v = V[idx];
  const h = document.getElementById('card-hint');

  h.innerHTML = getVocabHintHTML(v.vocab) || '?';
  h.style.display = 'inline';
  document.getElementById('brow-hint').classList.remove('visible');
}

function flipCard() {
  if (!V.length || !deck.length) return;
  const idx = deck[cur % deck.length];
  const v = V[idx];
  if ((typing && v && !v._isSentence && !v._isQA) || flipped) return;
  flipped = true;
  document.getElementById('brow-hint').classList.remove('visible');

  animateFlip(() => {
    const d = dir();
    const el = document.getElementById('arev');
    el.className = 'answer-reveal';
    el.style.display = 'block';
    document.getElementById('card-divider').style.display = 'block';
    document.getElementById('brow-hint').classList.remove('visible');
    showAnswerToggle();

    if (v._isQA) {
      // reveal the target side (Q + A together)
      el.style.fontSize = '';
      el.innerHTML = qaRevealHTML(v, d);
      showRow('brow-grade');
      showRepZone();
      return;
    }

    const ans = d === 'en-jp' ? v.jp + (v.kana ? '（' + v.kana + '）' : '') : v.en;
    el.style.fontSize = ans.length > 40 ? '15px' : ans.length > 25 ? '18px' : '22px';
    // furigana only annotates the JAPANESE side; never override an English answer
    if (showFurigana && d === 'en-jp') {
      if (v.furigana) {
        el.innerHTML = v.furigana;
      } else if (v.kana && v.kana !== v.jp) {
        el.innerHTML = rubyFromReading(v.jp, v.kana);
      } else {
        el.textContent = ans;
      }
    } else {
      el.textContent = ans;
    }
    if (v._isSentence && v.vocab) {
      const h = document.getElementById('card-hint');
      h.innerHTML = getVocabHintHTML(v.vocab);
      h.style.display = 'block';
    }
    showRow('brow-grade');
    showRepZone();
    if (autoplay && keyOffset[v._key] && dir() === 'en-jp') playCurrentAudio();
  });
}

function checkAnswer() {
  const idx = deck[cur % deck.length];
  const v = V[idx];
  const d = dir();
  const input = document.getElementById('ainput').value.trim();

  if (v._isSentence || v._isQA) {
    const el = document.getElementById('arev');
    el.className = 'answer-reveal';
    el.style.display = 'block';
    document.getElementById('card-divider').style.display = 'block';
    document.getElementById('brow-hint').classList.remove('visible');
    if (v._isQA) {
      el.style.fontSize = '';
      el.innerHTML = qaRevealHTML(v, d);
    } else {
      const ans = d === 'en-jp' ? v.jp : v.en;
      el.style.fontSize = ans.length > 40 ? '15px' : ans.length > 25 ? '18px' : '22px';
      // furigana only annotates the JAPANESE side; never override an English answer
      if (showFurigana && d === 'en-jp' && v.furigana) {
        el.innerHTML = v.furigana;
      } else {
        el.textContent = ans;
      }
      if (v.vocab) {
        const h = document.getElementById('card-hint');
        h.innerHTML = getVocabHintHTML(v.vocab);
        h.style.display = 'block';
      }
    }
    // show what user typed so they can compare
    const attempt = document.getElementById('user-attempt');
    if (input) {
      attempt.textContent = input;
      attempt.style.display = 'block';
    }
    showAnswerToggle();
    showRow('brow-grade');
    showRepZone();
    if (autoplay && keyOffset[v._key] && dir() === 'en-jp') playCurrentAudio();
    return;
  }

  let ok = false;
  if (d === 'en-jp') {
    const acc = [v.jp, v.kana].filter(Boolean).map(s => s.toLowerCase().replace(/\s/g, ''));
    ok = acc.includes(input.toLowerCase().replace(/\s/g, ''));
  } else {
    const acc = v.en.toLowerCase().split('/').map(s => s.trim());
    ok = input.length > 1 && acc.some(a => input.toLowerCase().includes(a) || a.includes(input.toLowerCase()));
  }
  const ans = d === 'en-jp' ? v.jp + (v.kana ? '（' + v.kana + '）' : '') : v.en;
  const el = document.getElementById('arev');
  el.textContent = ans;
  el.style.fontSize = ans.length > 40 ? '15px' : ans.length > 25 ? '18px' : '22px';
  el.style.display = 'block';
  el.className = 'answer-reveal ' + (ok ? 'ok' : 'bad');
  document.getElementById('card-divider').style.display = 'block';
  document.getElementById('brow-hint').classList.remove('visible');
  document.getElementById('card').className = 'card ' + (ok ? 'correct' : 'wrong');
  if (repGoal > 0) showAnswerToggle();
  const attempt = document.getElementById('user-attempt');
  if (input) {
    attempt.textContent = input;
    attempt.style.display = 'block';
  }
  if (autoplay && keyOffset[v._key] && dir() === 'en-jp') playCurrentAudio();
  markResult(ok, true);
  if (repGoal > 0) {
    showRepZone();
    const bNext = document.getElementById('brow-next');
    bNext.innerHTML = '<button class="btn" onclick="nextCard()">Next →</button>';
    showRow('brow-next');
  } else {
    setTimeout(nextCard, 320);
  }
}

function markResult(ok, fromTyping = false) {
  const idx = deck[cur % deck.length];
  const v = V[idx];

  sessionReviewed++;
  if (ok) {
    celebrate();
    sessionCorrect++;
    if (!v._isSentence && !v._isQA) {
      seenCards.add(v._key);
      scores[v._key] = Math.min((scores[v._key] || 0) + 1, 5);
      if (scores[v._key] >= 5) mastered.add(v._key);
    } else {
      sessionSentenceDone.add(v._key);
    }
  } else {
    if (!v._isSentence && !v._isQA) {
      seenCards.add(v._key);
      scores[v._key] = Math.max((scores[v._key] || 0) - 1, 0);
    }
    // repeat-until-correct: put this card back into the round
    requeueCard(idx);
  }
  updateStruggleBar(v);
  if (!fromTyping) setTimeout(nextCard, 320);
  updateStats();
  saveProgress();
}

function prevCard() {
  if (cur <= 0) return;
  cur--;
  animateCardBack(() => showCard());
}

function nextCard() {
  cur++;
  if (cur >= deck.length) {
    buildDeck();
    // if only sentences, don't show summary — just reshuffle silently
    const onlySentences = V.every(v => v._isSentence || v._isQA);
    if (!deck.length && !onlySentences) { showSummary(); return; }
    if (!deck.length) return;
  }
  animateCardAdvance(() => showCard());
}

// ─────────────────────────────────────────────────────────────
// SESSION SUMMARY
// ─────────────────────────────────────────────────────────────
function showSummary() {
  document.getElementById('card').style.display = 'none';
  showRow(null);
  const allDone = V.every(v => mastered.has(v._key));
  document.getElementById('sum-title').textContent = allDone ? 'All mastered! 🎉' : 'Round complete';
  document.getElementById('sum-reviewed').textContent = sessionReviewed;
  document.getElementById('sum-correct').textContent = sessionCorrect;
  const acc = sessionReviewed > 0 ? Math.round(sessionCorrect / sessionReviewed * 100) : 0;
  document.getElementById('sum-accuracy').textContent = acc + '%';
  document.getElementById('summary').classList.add('visible');
  
}

function nextRound() {
  sessionReviewed = 0; sessionCorrect = 0;
  buildDeck();
  if (!deck.length) {
    // Everything in the active sets is mastered, so there's nothing left to
    // build — wipe the active sets' progress so the user can practice again
    // instead of being stuck on the summary screen.
    resetActiveProgress();
    buildDeck();
  }
  if (!deck.length) { showSummary(); return; }
  showCard();
}

// Clear scores/mastered/seen for every card in the currently active sets.
function resetActiveProgress() {
  VOCAB_SETS.filter(s => activeSetIds.has(s.id)).forEach(s => {
    s.words.forEach((_, i) => {
      const k = s.id + ':' + i;
      delete scores[k];
      mastered.delete(k);
      seenCards.delete(k);
    });
  });
  saveProgress();
}

// ─────────────────────────────────────────────────────────────
// STATS
// ─────────────────────────────────────────────────────────────
function masteredCount() { return V.filter(v => !v._isSentence && !v._isQA && mastered.has(v._key)).length; }

function updateStats() {
  const mc = masteredCount();
  const vocabTotal = V.filter(v => !v._isSentence && !v._isQA).length;
  const sentTotal  = V.filter(v => v._isSentence || v._isQA).length;
  const sentOnly   = vocabTotal === 0 && sentTotal > 0;
  document.getElementById('s-mastered').textContent = sentOnly ? sessionSentenceDone.size : mc;
  document.getElementById('s-learning').textContent = sentOnly ? (sentTotal - sessionSentenceDone.size) : (vocabTotal - mc);
  document.getElementById('s-mastered-lbl').textContent = sentOnly ? 'Done' : 'Mastered';
  document.getElementById('s-learning-lbl').textContent = sentOnly ? 'Remaining' : 'Learning';
  updateSessionBar();
}

function updateSessionBar() {
  const bar = document.getElementById('session-bar');
  if (!bar) return;
  const activeLabels = VOCAB_SETS
    .filter(s => activeSetIds.has(s.id))
    .map(s => s.label + (s.qaSet ? ' Q&A' : s.sentenceSet ? ' sentences' : ' words'));
  const modeLabel = typing ? 'type' : 'reveal';
  const dirLabel = mode === 'en-jp' ? 'EN→JP' : mode === 'jp-en' ? 'JP→EN' : 'mixed';
  const vocabTotal = V.filter(v => !v._isSentence && !v._isQA).length;
  const mc = masteredCount();
  const parts = [...activeLabels, dirLabel, modeLabel];
  if (vocabTotal > 0) parts.push(mc + '/' + vocabTotal + ' mastered');
  bar.innerHTML = parts.map(p => '<span class="session-tag">' + p + '</span>').join('');
}

// ─────────────────────────────────────────────────────────────
// ANIMATION HELPERS
// ─────────────────────────────────────────────────────────────

// Flip reveal: rotate card-body out, swap content, rotate back in
function animateFlip(swapFn) {
  const body = document.getElementById('card-body');
  body.classList.add('flip-out');
  setTimeout(() => {
    body.classList.remove('flip-out');
    swapFn();
    body.classList.add('flip-in');
    setTimeout(() => body.classList.remove('flip-in'), 200);
  }, 180);
}

// Slide card out right, slide new content in from left (going back)
function animateCardBack(swapFn) {
  const cardEl = document.getElementById('card');
  cardEl.style.animation = 'cardSlideOutRight 0.2s ease both';
  setTimeout(() => {
    swapFn();
    cardEl.style.animation = 'none';
    void cardEl.offsetWidth;
    cardEl.style.animation = 'cardSlideInLeft 0.25s ease both';
  }, 200);
}

// Slide card out left, run swapFn, slide new content in from right
function animateCardAdvance(swapFn) {
  const cardEl = document.getElementById('card');
  cardEl.style.animation = 'cardSlideOutLeft 0.2s ease both';
  setTimeout(() => {
    swapFn();
    cardEl.style.animation = 'none';
    void cardEl.offsetWidth;
    cardEl.style.animation = 'cardSlideInRight 0.25s ease both';
  }, 200);
}

// ─────────────────────────────────────────────────────────────
// CONTROLS
// ─────────────────────────────────────────────────────────────
function setMode(m) {
  mode = m;
  ['enjp','jpen','mixed'].forEach(id => document.getElementById('tab-' + id).classList.toggle('active', 'tab-' + m.replace('-','') === 'tab-' + id));
  buildDeck(); showCard(); saveProgress();
}

function setTyping(t) {
  typing = t;
  document.getElementById('btn-type').classList.toggle('active', t);
  document.getElementById('btn-flip').classList.toggle('active', !t);
  if (!V.length || !deck.length) return;
  const v = V[deck[cur % deck.length]];
  if (flipped) return;
  if (t) {
    document.getElementById('ainput').value = '';
    document.getElementById('ainput').placeholder = (v._isSentence || v._isQA) ? '…' : '';
    showRow('input-row');
    setTimeout(() => document.getElementById('ainput').focus(), 50);
  } else {
    showRow(null);
    // restore hint btn if applicable
    if (v._isSentence && !flipped) {
      showRow('brow-hint');
    }
  }
  saveProgress();
}

// ── REP COUNTER ─────────────────────────────────────────────────

function showRepZone() {
  if (repGoal === 0) return;
  repCount = 0;
  updateRepArc();
  document.getElementById('rep-zone').style.display = 'flex';
}

function hideRepZone() {
  document.getElementById('rep-zone').style.display = 'none';
  repCount = 0;
}

let answerHidden = false;
function resetAnswerToggle() {
  answerHidden = false;
  document.getElementById('card-body').classList.remove('answer-hidden');
  const btn = document.getElementById('rep-toggle');
  if (btn) { btn.style.display = 'none'; }
}
// reveal the toggle once an answer is on screen
function showAnswerToggle() {
  const btn = document.getElementById('rep-toggle');
  if (btn) btn.style.display = 'inline-block';
}

function initMascot() {
  if (MASCOT_GIF) {
    document.getElementById('mascot').innerHTML =
      '<img src="' + MASCOT_GIF + '" alt="" />';
  }
}
let _celebrateTimer = null;
function celebrate() {
  const m = document.getElementById('mascot');
  if (!m) return;
  m.classList.remove('celebrate'); void m.offsetWidth; m.classList.add('celebrate');
  clearTimeout(_celebrateTimer);
  _celebrateTimer = setTimeout(() => m.classList.remove('celebrate'), 1600);
}
function toggleAnswer() {
  // only meaningful once an answer is on screen (the result / reps view)
  const revealed = flipped || document.getElementById('arev').style.display === 'block';
  if (!revealed) return;
  answerHidden = !answerHidden;
  document.getElementById('card-body').classList.toggle('answer-hidden', answerHidden);
}

function tapRep() {
  if (repGoal === 0) return;
  repCount = Math.min(repCount + 1, repGoal);
  updateRepArc();
  // pop animation
  const wrap = document.querySelector('.rep-arc-wrap');
  wrap.classList.remove('pop');
  void wrap.offsetWidth;
  wrap.classList.add('pop');
}

function decreaseRep() {
  if (repGoal === 0) return;
  repCount = Math.max(repCount - 1, 0);
  updateRepArc();
}

function updateRepArc() {
  const circumference = 201; // 2π×32
  const fill = document.getElementById('rep-arc-fill');
  const numEl = document.getElementById('rep-num');
  const pct = repGoal > 0 ? repCount / repGoal : 0;
  fill.style.strokeDashoffset = circumference * (1 - pct);
  fill.style.stroke = pct >= 1 ? 'var(--green)' : 'var(--accent)';
  numEl.textContent = repCount;
  document.getElementById('rep-goal').textContent = '/' + repGoal;
}

function setRepGoal(n) {
  repGoal = n;
  renderRepButtons();
  saveProgress();
  // if rep zone is visible, reset it
  if (document.getElementById('rep-zone').style.display !== 'none') {
    repCount = 0;
    updateRepArc();
  }
}

function renderRepButtons() {
  const container = document.getElementById('cfg-rep-btns');
  if (!container) return;
  const options = [0, 3, 5, 10, 15, 20];
  container.innerHTML = '';
  options.forEach(n => {
    const btn = document.createElement('button');
    btn.className = 'panel-btn' + (repGoal === n ? ' active' : '');
    btn.style.flex = '0 0 auto';
    btn.textContent = n === 0 ? 'Off' : n;
    btn.onclick = () => setRepGoal(n);
    container.appendChild(btn);
  });
}

function setTheme(dark) {
  isDark = dark;
  document.documentElement.classList.toggle('light', !isDark);
  document.getElementById('cfg-dark').classList.toggle('active', dark);
  document.getElementById('cfg-light').classList.toggle('active', !dark);
}

function setFurigana(on) {
  showFurigana = on;
  document.getElementById('cfg-furi-on').classList.toggle('active', on);
  document.getElementById('cfg-furi-off').classList.toggle('active', !on);
  saveProgress();
  if (!flipped) showCard(); // refresh current card immediately
}

// ─────────────────────────────────────────────────────────────
// RESET
// ─────────────────────────────────────────────────────────────
function resetAllData() {
  if (!confirm('Reset all progress for every set?')) return;
  closePanel('panel-config');
  Object.keys(scores).forEach(k => { scores[k] = 0; });
  mastered.clear(); seenCards.clear();
  sessionReviewed = 0; sessionCorrect = 0;
  saveProgress(); buildDeck(); showCard(); updateStats();
}

function resetSet(setId) {
  const s = VOCAB_SETS.find(x => x.id === setId);
  if (!s || !confirm('Reset progress for ' + s.label + (s.qaSet ? ' Q&A' : s.sentenceSet ? ' Sentences' : ' Words') + '?')) return;
  closePanel('panel-config');
  s.words.forEach((_, i) => { const k = setId + ':' + i; scores[k] = 0; mastered.delete(k); seenCards.delete(k); });
  saveProgress(); rebuildV(); buildDeck(); showCard(); updateStats();
}

// ─────────────────────────────────────────────────────────────
// PERSISTENCE — IndexedDB (works on file://) + localStorage fallback
// ─────────────────────────────────────────────────────────────
const STORAGE_KEY = 'vocab_quiz_v2';
let _db = null;

function _buildPayload() {
  // only save vocab scores — sentences are stateless
  const vocabScores = {};
  const vocabMastered = [];
  const vocabSeen = [];
  Object.keys(scores).forEach(k => {
    const [setId] = k.split(':');
    const set = VOCAB_SETS.find(s => s.id === parseInt(setId));
    if (set && !set.sentenceSet && !set.qaSet) {
      vocabScores[k] = scores[k];
    }
  });
  Array.from(mastered).forEach(k => {
    const [setId] = k.split(':');
    const set = VOCAB_SETS.find(s => s.id === parseInt(setId));
    if (set && !set.sentenceSet && !set.qaSet) vocabMastered.push(k);
  });
  Array.from(seenCards).forEach(k => {
    const [setId] = k.split(':');
    const set = VOCAB_SETS.find(s => s.id === parseInt(setId));
    if (set && !set.sentenceSet && !set.qaSet) vocabSeen.push(k);
  });
  return {
    scores: vocabScores,
    mastered: vocabMastered,
    seenCards: vocabSeen,
    activeSetIds: Array.from(activeSetIds),
    showFurigana, mode, typing, isDark, repGoal, autoplay
  };
}

function _applyPayload(d) {
  if (!d) return;
  if (d.scores) Object.assign(scores, d.scores);
  if (d.mastered) d.mastered.forEach(k => mastered.add(k));
  if (d.seenCards) d.seenCards.forEach(k => seenCards.add(k));
  if (d.showFurigana !== undefined) showFurigana = d.showFurigana;
  if (d.mode) mode = d.mode;
  if (d.typing !== undefined) typing = d.typing;
  if (d.isDark !== undefined) isDark = d.isDark;
  if (d.repGoal !== undefined) repGoal = d.repGoal;
  if (d.autoplay !== undefined) autoplay = d.autoplay;
  if (d.activeSetIds) {
    const valid = new Set(VOCAB_SETS.map(s => s.id));
    const restored = d.activeSetIds.filter(id => valid.has(id));
    if (restored.length) activeSetIds = new Set(restored);
  }
}

// IndexedDB wrapper
function _openDB() {
  return new Promise((res, rej) => {
    if (_db) { res(_db); return; }
    const req = indexedDB.open('vocab_quiz', 2);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('kv'))    db.createObjectStore('kv');
      if (!db.objectStoreNames.contains('audio')) db.createObjectStore('audio');
    };
    req.onsuccess = e => { _db = e.target.result; res(_db); };
    req.onerror = () => rej(req.error);
  });
}

function _idbSet(val) {
  return _openDB().then(db => new Promise((res, rej) => {
    const tx = db.transaction('kv', 'readwrite');
    tx.objectStore('kv').put(val, STORAGE_KEY);
    tx.oncomplete = res; tx.onerror = () => rej(tx.error);
  }));
}

function _idbGet() {
  return _openDB().then(db => new Promise((res, rej) => {
    const tx = db.transaction('kv', 'readonly');
    const req = tx.objectStore('kv').get(STORAGE_KEY);
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  }));
}

function saveProgress() {
  const payload = _buildPayload();
  // try IndexedDB first (works on file://)
  _idbSet(payload).catch(() => {
    // fall back to localStorage
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(payload)); } catch(e) {}
  });
}

function loadProgress() {
  // returns a Promise — call sites must handle async init
  return _idbGet().then(d => {
    if (d) { _applyPayload(d); return; }
    // try localStorage fallback
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) _applyPayload(JSON.parse(raw));
    } catch(e) {}
  }).catch(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) _applyPayload(JSON.parse(raw));
    } catch(e) {}
  });
}

// ── EXPORT / IMPORT ─────────────────────────────────────────────

function exportProgress() {
  const data = JSON.stringify(_buildPayload(), null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'vocab_progress.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importProgress() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json,application/json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const d = JSON.parse(ev.target.result);
        _applyPayload(d);
        saveProgress();
        // re-apply UI
        document.documentElement.classList.toggle('light', !isDark);
        document.getElementById('btn-type').classList.toggle('active', typing);
        document.getElementById('btn-flip').classList.toggle('active', !typing);
        ['enjp','jpen','mixed'].forEach(id =>
          document.getElementById('tab-' + id).classList.toggle('active',
            'tab-' + mode.replace('-','') === 'tab-' + id));
        rebuildV(); buildDeck(); showCard(); updateStats(); renderRepButtons();
        closePanel('panel-config');
      } catch(err) {
        alert('Invalid progress file.');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

// AUDIO — one long MP3 per volume + a static timestamp map.
// audio/maps.js (built offline by tools/build_audio_map.py) defines
//   window.QUIZ_AUDIO = { clips: { "setId:idx": [file, start, end] } }
// Playing a card = seek the MP3 to start, pause at end. No storage,
// no decoding, no runtime detection — the map is data.
// ─────────────────────────────────────────────────────────────
let keyOffset = {};    // "setId:idx" -> [file, startSec, endSec]
let audioEnd = null;   // currentTime to stop at
let audioCurrentKey = null;
let autoplay = false;
let activeAudioBtn = null;   // whichever button (card-audio or a qa-audio-btn) is "playing"

function audioInit() {
  const p = document.getElementById('audio-player');
  p.addEventListener('timeupdate', () => {
    if (audioEnd != null && p.currentTime >= audioEnd) { p.pause(); audioEnd = null; }
  });
  p.addEventListener('play',  () => { if (activeAudioBtn) activeAudioBtn.classList.add('playing'); });
  p.addEventListener('pause', () => { if (activeAudioBtn) activeAudioBtn.classList.remove('playing'); });
  p.addEventListener('ended', () => { audioEnd = null; });
}

function loadAudioMaps() {
  // decode embedded MP3s to in-memory blobs: instant, fully seekable, no files
  const reg = {};
  const b64 = window.QUIZ_AUDIO_B64 || {};
  for (const name in b64) {
    const bin = atob(b64[name]);
    const u8 = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) u8[i] = bin.charCodeAt(i);
    reg[name] = URL.createObjectURL(new Blob([u8], { type: 'audio/mpeg' }));
  }
  const raw = (window.QUIZ_AUDIO && window.QUIZ_AUDIO.clips) || {};
  keyOffset = {};
  const names = new Set();
  for (const k in raw) {
    const c = raw[k], name = c[0].split('/').pop();
    names.add(name);
    keyOffset[k] = [reg[name] || c[0], c[1], c[2]];
  }
  const first = Object.values(keyOffset)[0];
  if (first) { const p = document.getElementById('audio-player');
    p.src = first[0]; p.setAttribute('data-file', first[0]); }
  const el = document.getElementById('cfg-audio-status');
  if (el) {
    const n = Object.keys(keyOffset).length;
    el.textContent = n ? n + ' clips mapped · ' + [...names].join(', ')
                       : 'No audio embedded.';
  }
}

function playKey(key, el) {
  const seg = keyOffset[key]; if (!seg) return false;
  const p = document.getElementById('audio-player');
  if (p.getAttribute('data-file') !== seg[0]) { p.src = seg[0]; p.setAttribute('data-file', seg[0]); }
  p.pause(); audioEnd = null;               // never play until we truly sit at start (clears old btn's 'playing')
  activeAudioBtn = el || document.getElementById('card-audio');
  const t = seg[1];
  const begin = () => { audioEnd = seg[2]; p.play().catch(() => {}); };
  const seekThenBegin = (retried) => {
    if (Math.abs(p.currentTime - t) < 0.05) { begin(); return; }
    const onSeeked = () => {
      p.removeEventListener('seeked', onSeeked);
      // browsers clamp seeks into unbuffered data — verify we actually landed
      if (Math.abs(p.currentTime - t) > 0.75 && !retried) { seekThenBegin(true); return; }
      begin();
    };
    p.addEventListener('seeked', onSeeked);
    try { p.currentTime = t; } catch (e) { p.removeEventListener('seeked', onSeeked); }
  };
  const canSeek = () => {
    try { const s = p.seekable; return s.length > 0 && s.end(s.length - 1) >= Math.min(t, (p.duration || 1e9) - 0.2); }
    catch (e) { return false; }
  };
  const waitSeekable = () => {
    if (canSeek()) { seekThenBegin(false); return; }
    const iv = setInterval(() => { if (canSeek()) { clearInterval(iv); clearTimeout(to); seekThenBegin(false); } }, 60);
    const to = setTimeout(() => { clearInterval(iv); seekThenBegin(false); }, 6000);
  };
  if (p.readyState >= 1) waitSeekable();
  else p.addEventListener('loadedmetadata', waitSeekable, { once: true });
  return true;
}
function playCurrentAudio() { if (audioCurrentKey) playKey(audioCurrentKey, document.getElementById('card-audio')); }
function playQAPart(key, part, el) { playKey(key + ':' + part, el); }

function setAutoplay(on) {
  autoplay = on;
  document.getElementById('cfg-audio-auto-on').classList.toggle('active', on);
  document.getElementById('cfg-audio-auto-off').classList.toggle('active', !on);
  saveProgress();
}

// ─────────────────────────────────────────────────────────────
// KEYBOARD SHORTCUTS
// ─────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  // Space / Enter — flip card
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
  // Right arrow — flip card, or "Got it" when grading
  if (e.key === 'ArrowRight') {
    e.preventDefault();
    if (document.getElementById('brow-grade').classList.contains('visible')) markResult(true);
    else flipCard();
  }
  // Left arrow — go back, or "Missed" when grading
  if (e.key === 'ArrowLeft') {
    e.preventDefault();
    if (document.getElementById('brow-grade').classList.contains('visible')) markResult(false);
    else prevCard();
  }
  // Up arrow — increment rep
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (document.getElementById('rep-zone').style.display !== 'none') tapRep();
  }
  // Down arrow — decrement rep
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (document.getElementById('rep-zone').style.display !== 'none') decreaseRep();
  }
  // P — play audio for current card
  if (e.key === 'p' || e.key === 'P') { e.preventDefault(); playCurrentAudio(); }
  // Q / A — play just the question or answer half, for Q&A cards
  if (e.key === 'q' || e.key === 'Q') {
    const v = V[deck[cur % Math.max(deck.length, 1)]];
    if (v && v._isQA) { e.preventDefault(); playQAPart(v._key, 'q', document.querySelector('.qa-audio-btn[data-qa="' + v._key + ':q"]')); }
  }
  if (e.key === 'a' || e.key === 'A') {
    const v = V[deck[cur % Math.max(deck.length, 1)]];
    if (v && v._isQA) { e.preventDefault(); playQAPart(v._key, 'a', document.querySelector('.qa-audio-btn[data-qa="' + v._key + ':a"]')); }
  }
  // H — hide/show the answer (active recall during spoken reps)
  if (e.key === 'h' || e.key === 'H') { e.preventDefault(); toggleAnswer(); }
});

// ─────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────
(async () => {
  const defaultSet = VOCAB_SETS.find(s => s.id === 7) || VOCAB_SETS[0];
  activeSetIds = new Set([defaultSet.id]);
  audioInit();
  initMascot();
  await loadProgress();
  loadAudioMaps();
  // apply restored UI state
  document.documentElement.classList.toggle('light', !isDark);
  document.getElementById('btn-type').classList.toggle('active', typing);
  document.getElementById('btn-flip').classList.toggle('active', !typing);
  document.getElementById('cfg-audio-auto-on').classList.toggle('active', autoplay);
  document.getElementById('cfg-audio-auto-off').classList.toggle('active', !autoplay);
  ['enjp','jpen','mixed'].forEach(id => document.getElementById('tab-' + id).classList.toggle('active', 'tab-' + mode.replace('-','') === 'tab-' + id));
  rebuildV();
  buildDeck();
  showCard();
  updateStats();
  renderRepButtons();
})();
</script>
